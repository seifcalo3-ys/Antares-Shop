<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>نظام 𝑨𝑵𝑻𝑨𝑹𝑬𝑺</title>
    <style>
        body { background: #000; color: #ff0000; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { border: 2px solid #8B0000; padding: 20px; border-radius: 15px; background: #111; max-width: 400px; margin: auto; }
        button { background: #8B0000; color: white; padding: 15px 25px; border: none; border-radius: 10px; cursor: pointer; margin-top: 10px; width: 100%; }
        .reset-btn { background: #330000; border: 1px solid #ff0000; margin-top: 30px; font-size: 12px; }
        .admin-btn { background: #ffd700; color: #000; font-weight: bold; display: none; }
        .claim-btn { background: #008B8B; display: none; } /* زر استلام المكافأة */
        #taskText { text-align: right; padding: 10px; border: 1px solid #444; margin-top: 10px; color: #fff; }
    </style>
</head>
<body>

    <div class="card">
        <h2>نظام 𝑨𝑵𝑻𝑨𝑹𝑬𝑺</h2>
        <div id="stats">المستوى: 0 | النقاط: 0</div>
        <p id="dayText">المهمة رقم: 1</p>
        <div id="taskText">جاري التحميل...</div>
        
        <button id="completeBtn" onclick="completeTask()">إتمام المهمة</button>
        <!-- زر استلام المكافأة -->
        <button id="claimBtn" class="claim-btn" onclick="claimReward()">استلام المكافأة: <span id="rewardName"></span></button>
        
        <button id="adminBtn" class="admin-btn" onclick="godMode()">تفعيل قوة الملك (God Mode)</button>
        <button onclick="window.location.href='index.html'" style="background: #444;">الرئيسية</button>
        <button class="reset-btn" onclick="resetSystem()">تصفير النظام (Reset)</button>
    </div>

    <script>
        const exercises = ["ضغط", "سكوات", "بطن", "بلانك", "طعن", "بربيز", "تسلق جبل"];
        
        function updateUI() {
            let stats = getStats();
            // إظهار زر المكافأة لو فيه حاجة معلقة
            let pending = localStorage.getItem('pendingReward');
            if(pending) {
                document.getElementById('claimBtn').style.display = "block";
                document.getElementById('rewardName').innerText = pending;
            }

            if (localStorage.getItem('isAdmin') === 'true') document.getElementById('adminBtn').style.display = "block";
            
            if (!stats.task) { stats.task = generateTask(stats.count); localStorage.setItem('currentTask', stats.task); }
            document.getElementById("stats").innerText = "المستوى: " + Math.floor(stats.xp / 100) + " | النقاط: " + stats.xp;
            document.getElementById("dayText").innerText = "المهمة رقم: " + (stats.count + 1);
            document.getElementById("taskText").innerHTML = stats.task;
        }

        function claimReward() {
            let reward = localStorage.getItem('pendingReward');
            if(reward) {
                let inv = JSON.parse(localStorage.getItem('myRewards')) || [];
                inv.push(reward);
                localStorage.setItem('myRewards', JSON.stringify(inv));
                localStorage.removeItem('pendingReward');
                document.getElementById('claimBtn').style.display = "none";
                alert("تمت إضافة " + reward + " إلى المخزن بنجاح!");
            }
        }

        function completeTask() {
            let today = new Date().toDateString();
            let stats = getStats();
            if (stats.lastDate === today && localStorage.getItem('isAdmin') !== 'true') {
                alert("⛔ يا بطل، لقد أتممت مهمة اليوم بالفعل!");
                return;
            }
            stats.xp += 20;
            stats.count++;
            stats.lastDate = today;
            stats.task = generateTask(stats.count);
            localStorage.setItem('xp', stats.xp);
            localStorage.setItem('count', stats.count);
            localStorage.setItem('currentTask', stats.task);
            localStorage.setItem('lastDate', today);
            
            // تحقق من الجائزة
            const rewards = { 5: "خنجر الصدأ", 10: "درع الجلد", 15: "سيف الفولاذ", 20: "عباءة الظل", 30: "رمح التنين", 50: "نصل الأنتاريس" };
            if (rewards[stats.count]) {
                localStorage.setItem('pendingReward', rewards[stats.count]);
            }
            updateUI();
        }

        // باقي الدوال (getStats, generateTask, godMode, resetSystem) كما هي...
        function getStats() { return { xp: parseInt(localStorage.getItem('xp'))||0, count: parseInt(localStorage.getItem('count'))||0, task: localStorage.getItem('currentTask')||"", lastDate: localStorage.getItem('lastDate')||"" }; }
        function generateTask(c) { let i = Math.floor(c/3)+1; return "<strong>تدريب اليوم:</strong><br>• ضغط: "+(i*10)+"<br>• سكوات: "+(i*10)+"<br>• بلانك: "+(i*20)+" ثانية"; }
        function godMode() { localStorage.setItem('xp', 10000); localStorage.setItem('count', 100); location.reload(); }
        function resetSystem() { if(confirm("تصفير؟")) { localStorage.clear(); location.reload(); } }

        updateUI();
    </script>
</body>
</html>

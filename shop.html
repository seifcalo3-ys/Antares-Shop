<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سوق 𝑨𝑵𝑻𝑨𝑹𝑬𝑺 المتطور</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { border: 2px solid #8B0000; padding: 15px; border-radius: 15px; background: #111; margin: 10px auto; max-width: 600px; }
        .tabs { display: flex; justify-content: space-around; margin-bottom: 10px; }
        .tab-btn { background: #333; color: white; padding: 10px; cursor: pointer; border-radius: 5px; flex: 1; margin: 0 5px; }
        .active { background: #8B0000; font-weight: bold; }
        .list { height: 350px; overflow-y: scroll; padding: 10px; border: 1px solid #333; text-align: right; }
        .item { border: 1px solid #444; padding: 10px; margin: 5px 0; border-radius: 10px; background: #1a1a1a; display: flex; align-items: center; }
        button { background: #8B0000; color: white; padding: 5px 10px; border: none; border-radius: 5px; cursor: pointer; }
        img { width: 50px; height: 50px; margin-left: 10px; border-radius: 8px; border: 1px solid #555; }
        .inventory-list { text-align: right; }
    </style>
</head>
<body>

    <div class="card">
        <h1>سوق 𝑨𝑵𝑻𝑨𝑹𝑬𝑺</h1>
        <h3>النقاط المتاحة: <span id="xpDisplay">0</span></h3>
    </div>

    <div class="card">
        <div class="tabs">
            <div class="tab-btn active" onclick="showCategory('swords', this)">سيوف</div>
            <div class="tab-btn" onclick="showCategory('daggers', this)">خناجر</div>
            <div class="tab-btn" onclick="showCategory('inventory', this)">المخزن</div>
        </div>
        <div id="shopItems" class="list"></div>
    </div>

    <script>
        let xp = parseInt(localStorage.getItem('xp')) || 20000;
        let inventory = JSON.parse(localStorage.getItem('myInventory')) || [];
        
        function updateXP() { document.getElementById("xpDisplay").innerText = xp; localStorage.setItem('xp', xp); }
        updateXP();

        const data = {
            swords: [
                { id: 1, name: "سيف الظل الملكي", price: 50000, img: "https://raw.githubusercontent.com/seifcalo3-ys/Antares-Assets/main/a0952790f10e975f6c9b8f337fed5e7d.jpg" },
                { id: 2, name: "قاطع الأرواح", price: 25000, img: "https://raw.githubusercontent.com/seifcalo3-ys/Antares-Assets/main/aff073c457fc9bb8480dc342dd5892a4.jpg" }
            ],
            daggers: [
                { id: 3, name: "خنجر السم الأرجواني", price: 9000, img: "https://raw.githubusercontent.com/seifcalo3-ys/Antares-Assets/main/251c325f580264b8aa9eb64aff95770d.jpg" }
            ]
        };

        function buyItem(id, price, name) {
            if (xp >= price) {
                xp -= price;
                inventory.push(name);
                localStorage.setItem('myInventory', JSON.stringify(inventory));
                updateXP();
                alert("تم شراء " + name + " بنجاح!");
            } else {
                alert("نقاطك غير كافية يا محارب!");
            }
        }

        function showCategory(cat, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            
            const shopDiv = document.getElementById("shopItems");
            shopDiv.innerHTML = "";

            if (cat === 'inventory') {
                shopDiv.innerHTML = inventory.length > 0 ? inventory.map(item => `<div class="item">🛡️ ${item}</div>`).join('') : "<p>المخزن فارغ!</p>";
            } else {
                data[cat].forEach(item => {
                    shopDiv.innerHTML += `
                        <div class="item">
                            <img src="${item.img}">
                            <div style="flex-grow:1"><strong>${item.name}</strong><br><small>السعر: ${item.price}</small></div>
                            <button onclick="buyItem(${item.id}, ${item.price}, '${item.name}')">شراء</button>
                        </div>`;
                });
            }
        }
        
        showCategory('swords', document.querySelector('.tab-btn'));
    </script>
</body>
</html>

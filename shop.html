<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوق 𝑨𝑵𝑻𝑨𝑹𝑬𝑺</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .card { border: 2px solid #8B0000; padding: 15px; border-radius: 20px; background: #111; width: 100%; max-width: 600px; margin-bottom: 20px; text-align: center; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { background: #333; color: white; padding: 10px; cursor: pointer; border-radius: 10px; flex: 1; transition: 0.3s; }
        .active { background: #8B0000; font-weight: bold; }
        .list { flex-grow: 1; overflow-y: auto; width: 100%; max-width: 600px; padding: 10px; border: 1px solid #333; border-radius: 15px; }
        .item { border: 1px solid #444; padding: 10px; margin-bottom: 10px; border-radius: 12px; background: #1a1a1a; display: flex; align-items: center; }
        button { background: #8B0000; color: white; padding: 8px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        img { width: 60px; height: 60px; margin-left: 15px; border-radius: 10px; border: 1px solid #555; }
        .price { color: #FFD700; font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="card">
        <h1>سوق 𝑨𝑵𝑻𝑨𝑹𝑬𝑺</h1>
        <h3>النقاط: <span id="xpDisplay" style="color: gold;">0</span></h3>
        <button onclick="window.location.href='index.html'" style="background: #444; width: 100%;">العودة للرئيسية</button>
    </div>

    <div class="tabs" style="width: 100%; max-width: 600px;">
        <div class="tab-btn active" onclick="showCategory('swords', this)">سيوف</div>
        <div class="tab-btn" onclick="showCategory('daggers', this)">خناجر</div>
        <div class="tab-btn" onclick="showCategory('inventory', this)">المخزن</div>
    </div>

    <div id="shopItems" class="list"></div>

    <script>
        let xp = parseInt(localStorage.getItem('xp')) || 20000;
        let inventory = JSON.parse(localStorage.getItem('myInventory')) || [];
        
        function updateXP() { document.getElementById("xpDisplay").innerText = xp; localStorage.setItem('xp', xp); }
        updateXP();

        const data = {
            swords: [
                { name: "سيف الظل الملكي", price: 50000, img: "https://raw.githubusercontent.com/seifcalo3-ys/Antares-Assets/main/a0952790f10e975f6c9b8f337fed5e7d.jpg" },
                { name: "قاطع الأرواح", price: 25000, img: "https://raw.githubusercontent.com/seifcalo3-ys/Antares-Assets/main/aff073c457fc9bb8480dc342dd5892a4.jpg" },
                { name: "نصل التنين الفضي", price: 18000, img: "https://raw.githubusercontent.com/seifcalo3-ys/Antares-Assets/main/1535eaef2dbcf256de36ed2307dad0ac.jpg" },
                { name: "شفرة العدالة", price: 12000, img: "https://raw.githubusercontent.com/seifcalo3-ys/Antares-Assets/main/2e6c1a53cc4d056fd484fd257d374945.jpg" },
                { name: "رمح الرعد", price: 8500, img: "https://raw.githubusercontent.com/seifcalo3-ys/Antares-Assets/main/2902f86a968e63bad4d7e9dc5b29d3cd.jpg" }
            ],
            daggers: [
                { name: "خنجر السم الأرجواني", price: 9000, img: "https://raw.githubusercontent.com/seifcalo3-ys/Antares-Assets/main/251c325f580264b8aa9eb64aff95770d.jpg" },
                { name: "خنجر النصل المزدوج", price: 6500, img: "https://raw.githubusercontent.com/seifcalo3-ys/Antares-Assets/main/1a2e7457fdcdc4b288c3d59378b5f856.jpg" },
                { name: "خنجر الظل الغامض", price: 6000, img: "https://raw.githubusercontent.com/seifcalo3-ys/Antares-Assets/main/a509e474917cf61f72a948576189b8b1.jpg" },
                { name: "خنجر الدم القرمزي", price: 4500, img: "https://raw.githubusercontent.com/seifcalo3-ys/Antares-Assets/main/924638affb4662c2142c439d6e8666db.jpg" },
                { name: "خنجر الصقيع", price: 4000, img: "https://raw.githubusercontent.com/seifcalo3-ys/Antares-Assets/main/464f4e2b56643dc9f18af837d147ca58.jpg" }
            ]
        };

        function buyItem(name, price) {
            if (xp >= price) {
                xp -= price;
                inventory.push(name);
                localStorage.setItem('myInventory', JSON.stringify(inventory));
                updateXP();
                alert("تم شراء " + name + " بنجاح!");
                showCategory('inventory', null); // تحديث العرض بعد الشراء
            } else {
                alert("نقاطك غير كافية يا محارب!");
            }
        }

        function showCategory(cat, btn) {
            if(btn) {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            
            const shopDiv = document.getElementById("shopItems");
            shopDiv.innerHTML = "";

            if (cat === 'inventory') {
                shopDiv.innerHTML = inventory.length > 0 ? inventory.map(item => `<div class="item">🛡️ ${item}</div>`).join('') : "<p>المخزن فارغ! ابدأ بالنهب.</p>";
            } else {
                data[cat].forEach(item => {
                    shopDiv.innerHTML += `
                        <div class="item">
                            <img src="${item.img}">
                            <div style="flex-grow:1; text-align:right;"><strong>${item.name}</strong><br><small class="price">السعر: ${item.price}</small></div>
                            <button onclick="buyItem('${item.name}', ${item.price})">شراء</button>
                        </div>`;
                });
            }
        }
        
        showCategory('swords', document.querySelector('.tab-btn'));
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سوق 𝑨𝑵𝑻𝑨𝑹𝑬𝑺 المتطور</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { border: 2px solid #8B0000; padding: 15px; border-radius: 15px; background: #111; margin: 10px auto; max-width: 600px; }
        .tabs { display: flex; justify-content: space-around; margin-bottom: 10px; }
        .tab-btn { background: #333; color: white; padding: 10px; cursor: pointer; border-radius: 5px; flex: 1; margin: 0 5px; }
        .active { background: #8B0000; font-weight: bold; }
        .list { height: 350px; overflow-y: scroll; padding: 10px; border: 1px solid #333; text-align: right; }
        .item { border: 1px solid #444; padding: 10px; margin: 5px 0; border-radius: 10px; background: #1a1a1a; display: flex; align-items: center; }
        button { background: #8B0000; color: white; padding: 5px 10px; border: none; border-radius: 5px; cursor: pointer; }
        img { width: 50px; height: 50px; margin-left: 10px; border-radius: 8px; border: 1px solid #555; }
    </style>
</head>
<body>

    <div class="card">
        <h1>سوق 𝑨𝑵𝑻𝑨𝑹𝑬𝑺</h1>
        <h3>النقاط المتاحة: <span id="xpDisplay">0</span></h3>
    </div>

    <div class="card">
        <div class="tabs">
            <div class="tab-btn active" onclick="showCategory('swords', this)">سيوف</div>
            <div class="tab-btn" onclick="showCategory('daggers', this)">خناجر</div>
            <div class="tab-btn" onclick="showCategory('shields', this)">دروع</div>
        </div>
        <div id="shopItems" class="list"></div>
    </div>

    <script>
        let xp = parseInt(localStorage.getItem('xp')) || 20000;
        document.getElementById("xpDisplay").innerText = xp;

        const data = {
            swords: [
                { name: "سيف الظل الملكي", price: 50000, img: "https://raw.githubusercontent.com/seifcalo3-ys/Antares-Assets/main/a0952790f10e975f6c9b8f337fed5e7d.jpg" },
                { name: "قاطع الأرواح", price: 25000, img: "https://raw.githubusercontent.com/seifcalo3-ys/Antares-Assets/main/aff073c457fc9bb8480dc342dd5892a4.jpg" },
                { name: "نصل التنين الفضي", price: 18000, img: "https://raw.githubusercontent.com/seifcalo3-ys/Antares-Assets/main/1535eaef2dbcf256de36ed2307dad0ac.jpg" },
                { name: "شفرة العدالة المتوهجة", price: 12000, img: "https://raw.githubusercontent.com/seifcalo3-ys/Antares-Assets/main/2e6c1a53cc4d056fd484fd257d374945.jpg" },
                { name: "رمح الرعد المقدس", price: 8500, img: "https://raw.githubusercontent.com/seifcalo3-ys/Antares-Assets/main/2902f86a968e63bad4d7e9dc5b29d3cd.jpg" },
                { name: "مطرقة التيتان", price: 7000, img: "https://raw.githubusercontent.com/seifcalo3-ys/Antares-Assets/main/aa28c8389f1f4d146b70f5b6333d7e6c.jpg" },
                { name: "سيف الفراغ المطلق", price: 5000, img: "https://raw.githubusercontent.com/seifcalo3-ys/Antares-Assets/main/47fe8efa0a6473ccb9ba7bab8156e120.jpg" },
                { name: "نصل الرياح السريعة", price: 2500, img: "https://raw.githubusercontent.com/seifcalo3-ys/Antares-Assets/main/10589290957e9f314ba6e3cf8249d06a.jpg" },
                { name: "قوس النجوم", price: 9500, img: "https://raw.githubusercontent.com/seifcalo3-ys/Antares-Assets/main/318d87faa8267c5bc8d251553f3d7b15.jpg" }
            ],
            daggers: [
                { name: "خنجر السم الأرجواني", price: 9000, img: "https://raw.githubusercontent.com/seifcalo3-ys/Antares-Assets/main/251c325f580264b8aa9eb64aff95770d.jpg" },
                { name: "خنجر النصل المزدوج", price: 6500, img: "https://raw.githubusercontent.com/seifcalo3-ys/Antares-Assets/main/1a2e7457fdcdc4b288c3d59378b5f856.jpg" },
                { name: "خنجر الظل الغامض", price: 6000, img: "https://raw.githubusercontent.com/seifcalo3-ys/Antares-Assets/main/a509e474917cf61f72a948576189b8b1.jpg" },
                { name: "خنجر الدم القرمزي", price: 4500, img: "https://raw.githubusercontent.com/seifcalo3-ys/Antares-Assets/main/924638affb4662c2142c439d6e8666db.jpg" },
                { name: "خنجر الصقيع", price: 4000, img: "https://raw.githubusercontent.com/seifcalo3-ys/Antares-Assets/main/464f4e2b56643dc9f18af837d147ca58.jpg" },
                { name: "خنجر البرق الخاطف", price: 3000, img: "https://raw.githubusercontent.com/seifcalo3-ys/Antares-Assets/main/36c78567203296bcb5b1a8b7a3c8a5fd.jpg" },
                { name: "خنجر الحارس القديم", price: 2800, img: "https://raw.githubusercontent.com/seifcalo3-ys/Antares-Assets/main/40afbc88ea6bbd4d43fd7e9fa749fd30.jpg" },
                { name: "خنجر النيران الملتهبة", price: 4200, img: "https://raw.githubusercontent.com/seifcalo3-ys/Antares-Assets/main/b5e9f036985276e89440fc312b5c0a62.jpg" },
                { name: "خنجر الرياح الهادئة", price: 2200, img: "https://raw.githubusercontent.com/seifcalo3-ys/Antares-Assets/main/4fc672ace82511d98ae443c88f7f9d9f.jpg" },
                { name: "خنجر الأثير الأسود", price: 9500, img: "https://raw.githubusercontent.com/seifcalo3-ys/Antares-Assets/main/ac80bf85ce83bdef4dc477701a046ac7.jpg" }
            ],
            shields: [] // يمكنك إضافة الدروع هنا لاحقاً
        };

        function showCategory(cat, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const shopDiv = document.getElementById("shopItems");
            shopDiv.innerHTML = data[cat].length > 0 ? "" : "<p>قريباً...</p>";
            
            data[cat].forEach(item => {
                shopDiv.innerHTML += `
                    <div class="item">
                        <img src="${item.img}">
                        <div style="flex-grow:1"><strong>${item.name}</strong><br><small>السعر: ${item.price}</small></div>
                        <button>شراء</button>
                    </div>`;
            });
        }
        
        // العرض الافتراضي
        showCategory('swords', document.querySelector('.tab-btn'));
    </script>
</body>
</html>

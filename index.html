<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝑨𝑵𝑻𝑨𝑹𝑬𝑺 - الرئيسية</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { border: 2px solid #8B0000; padding: 20px; border-radius: 15px; background: #111; max-width: 500px; margin: auto; }
        .menu-btn { 
            display: block; width: 90%; margin: 15px auto; padding: 15px; 
            background: #8B0000; color: white; text-decoration: none; 
            border-radius: 10px; font-weight: bold; transition: 0.3s;
        }
        .menu-btn:hover { background: #D32F2F; transform: scale(1.05); }
        h1 { color: #8B0000; text-shadow: 0 0 10px #8B0000; }
    </style>
</head>
<body>

    <div class="card">
        <h1>مرحباً بك في 𝑨𝑵𝑻𝑨𝑹𝑬𝑺</h1>
        <p>أين تريد الذهاب اليوم؟</p>

        <!-- روابط التنقل -->
        <a href="shop.html" class="menu-btn">🛒 المتجر</a>
        <a href="tasks.html" class="menu-btn">⚔️ المهام اليومية</a>
        <a href="inventory.html" class="menu-btn">📦 المخزون</a>
    </div>

    <!-- لوحة التحكم السرية للمطور -->
    <div class="card" style="margin-top: 20px; border: 1px dashed gold;">
        <small>النقاط الحالية: <span id="xpDisplay">0</span></small>
    </div>

    <script>
        // إظهار النقاط من التخزين المحلي
        let xp = localStorage.getItem('xp') || 0;
        document.getElementById("xpDisplay").innerText = xp;
    </script>
</body>
</html>
